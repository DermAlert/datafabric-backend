  #     - shared-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl --silent --fail http://localhost:8006/health || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio123
      - MINIO_SERVER_URL=http://localhost:9000
      - MINIO_BROWSER_REDIRECT_URL=http://localhost:9001
    volumes:
      - ./data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://127.0.0.1:9000/minio/health/ready || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 10
    networks:
      - shared-network

  postgres-airflow:
    image: postgres:18.1
    ports: 
      - 5433:5432
    # Airflow clients: scheduler(1) + webserver(1) + workers(≤3) + headroom = ~20
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=256MB
      -c work_mem=8MB
      -c jit=off
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=dermalert_airflow
    volumes:
      - airflow_pgdata:/var/lib/postgresql
    healthcheck:
     test: ["CMD-SHELL", "pg_isready -U postgres"]
     interval: 10s
     timeout: 5s
     retries: 5
    networks:
      - shared-network

  postgres-backend:
    image: postgres:18.1
    ports: 
      - 5434:5432
    # Connection budget:
    #   FastAPI pool  : pool_size(30) + max_overflow(70) = 100
    #   Airflow       : ~20
    #   Trino JDBC    : ~10
    #   tools / admin : ~5
    #   safety buffer : 15
    #   TOTAL         : ~150  →  max_connections=200
    command: >
      postgres
      -c max_connections=200
      -c io_method=worker
      -c io_workers=4
      -c shared_buffers=512MB
      -c work_mem=16MB
      -c jit=off
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=dermalert_backend
    volumes:
      - backend_pgdata:/var/lib/postgresql
    healthcheck:
     test: ["CMD-SHELL", "pg_isready -U postgres"]
     interval: 10s
     timeout: 5s
     retries: 5
    networks:
      - shared-network

  redis:
    image: redis:7.2-bookworm
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always
    networks:
      - shared-network

  # ==========================================================================
  # Hive Metastore - Central metadata repository for all catalogs
  # ==========================================================================
  # postgres-metastore:
  #   image: postgres:15.3
  #   environment:
  #     - POSTGRES_USER=hive
  #     - POSTGRES_PASSWORD=hive123
  #     - POSTGRES_DB=metastore
  #   volumes:
  #     - metastore_pgdata:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - shared-network

  # hive-metastore:
  #   build:
  #     context: ./hive/images
  #     dockerfile: Dockerfile
  #   platform: linux/amd64
  #   environment:
  #     - SERVICE_NAME=metastore
  #     - DB_DRIVER=postgres
  #     - SERVICE_OPTS=-Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres-metastore:5432/metastore -Djavax.jdo.option.ConnectionUserName=hive -Djavax.jdo.option.ConnectionPassword=hive123
  #     # S3/MinIO access for internal metastore bucket
  #     - AWS_ACCESS_KEY_ID=minio
  #     - AWS_SECRET_ACCESS_KEY=minio123
  #     - AWS_REGION=us-east-1
  #   ports:
  #     - "9083:9083"
  #   volumes:
  #     - ./hive/conf:/opt/hive/conf
  #   depends_on:
  #     postgres-metastore:
  #       condition: service_healthy
  #     minio:
  #       condition: service_healthy
  #   healthcheck:
  #     test: ["CMD-SHELL", "netstat -tlnp | grep 9083 || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 60s
  #   networks:
  #     - shared-network
  #   restart: unless-stopped

  trino:
    image: trinodb/trino:latest
    platform: linux/amd64 
    ports:
      - "8089:8080"
    volumes:
      - ./trino:/etc/trino
    extra_hosts:
      - "localhost:host-gateway"  # Permite acessar localhost do host (ex: PostgreSQL em localhost:5432)
    networks:
      - shared-network
    depends_on:
      - minio
      # - hive-metastore
    restart: unless-stopped

  # ==========================================================================
  # Spark Standalone Cluster
  # Isolates Spark JVM from the FastAPI process — eliminates CPU starvation.
  # Switch backend from local[*] to spark://spark-master:7077 via .env.
  #
  # Web UIs:
  #   Master:  http://localhost:8082
  #   Worker:  http://localhost:8083
  # ==========================================================================
  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark-worker
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host spark-master --port 7077 --webui-port 8082
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: "7077"
      SPARK_MASTER_WEBUI_PORT: "8082"
      # MinIO credentials so executors can access S3A directly
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      AWS_REGION: us-east-1
      # Enable FileSystem recovery so Master state survives restarts
      # Without this, backend's SparkSession waits forever for the old Master
      SPARK_MASTER_OPTS: "-Dspark.deploy.recoveryMode=FILESYSTEM -Dspark.deploy.recoveryDirectory=/opt/spark/recovery"
    volumes:
      - spark_master_recovery:/opt/spark/recovery
    ports:
      - "7077:7077"
      - "8082:8082"
    networks:
      - shared-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://localhost:8082 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  spark-worker:
    build:
      context: .
      dockerfile: Dockerfile.spark-worker
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077 --webui-port 8083
    environment:
      SPARK_MASTER: spark://spark-master:7077
      # Give each worker 6 GB RAM and 4 cores — adjust to your machine.
      # With pool_size=3, max 3 jobs × 2 executors = 6 executors share these.
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY:-6g}
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES:-4}
      SPARK_WORKER_WEBUI_PORT: "8083"
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      AWS_REGION: us-east-1
    ports:
      - "8083:8083"
    depends_on:
      spark-master:
        condition: service_healthy
    networks:
      - shared-network
    restart: unless-stopped
    # Detect the "TCP survives master restart" scenario: the Master loses all
    # in-memory state after a restart, but the Worker's existing TCP connection
    # keeps heartbeats flowing — the Master just ignores them because the Worker
    # ID is completely unknown to the new process. Without this healthcheck the
    # Worker sits unregistered indefinitely, making all Spark jobs stall.
    #
    # The check queries the Master REST API and verifies that THIS worker
    # (matched by container hostname) appears with state ALIVE. If not, the
    # container is marked unhealthy → Docker restarts it → clean registration.
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python3 -c \"import urllib.request as u,json,sys,socket,os; ip=socket.gethostbyname(socket.gethostname()); data=json.loads(u.urlopen('http://spark-master:8082/json/',timeout=5).read()); sys.exit(0) if any(w.get('state')=='ALIVE' and ip in w.get('id','') for w in data.get('workers',[])) else os.system('kill 1')\""
      interval: 30s
      timeout: 10s
      retries: 2
      start_period: 60s

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - shared-network

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - shared-network

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - shared-network

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    networks:
      - shared-network

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        if [[ -z "${AIRFLOW_UID}" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: AIRFLOW_UID not set!\e[0m"
          echo "If you are on Linux, you SHOULD follow the instructions below to set "
          echo "AIRFLOW_UID environment variable, otherwise files will be owned by root."
          echo "For other operating systems you can get rid of the warning with manually created .env file:"
          echo "    See: https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html#setting-the-right-airflow-user"
          echo
        fi
        one_meg=1048576
        mem_available=$$(($$(getconf _PHYS_PAGES) * $$(getconf PAGE_SIZE) / one_meg))
        cpus_available=$$(grep -cE 'cpu[0-9]+' /proc/stat)
        disk_available=$$(df / | tail -1 | awk '{print $$4}')
        warning_resources="false"
        if (( mem_available < 4000 )) ; then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough memory available for Docker.\e[0m"
          echo "At least 4GB of memory required. You have $$(numfmt --to iec $$((mem_available * one_meg)))"
          echo
          warning_resources="true"
        fi
        if (( cpus_available < 2 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough CPUS available for Docker.\e[0m"
          echo "At least 2 CPUs recommended. You have $${cpus_available}"
          echo
          warning_resources="true"
        fi
        if (( disk_available < one_meg * 10 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough Disk space available for Docker.\e[0m"
          echo "At least 10 GBs recommended. You have $$(numfmt --to iec $$((disk_available * 1024 )))"
          echo
          warning_resources="true"
        fi
        if [[ $${warning_resources} == "true" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: You have not enough resources to run Airflow (see above)!\e[0m"
          echo "Please follow the instructions to increase amount of resources available:"
          echo "   https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html#before-you-begin"
          echo
        fi
        mkdir -p /sources/logs /sources/dags /sources/plugins
        chown -R "${AIRFLOW_UID}:0" /sources/{logs,dags,plugins}
        exec /entrypoint airflow version
        # Create spark_pool for controlling Spark job concurrency
        airflow pools set spark_pool ${SPARK_POOL_SIZE:-3} "Controls max concurrent Spark jobs (Silver + Bronze)" || true
        # Create HTTP connection for the datafabric backend
        airflow connections add datafabric_backend \
          --conn-type http \
          --conn-host http://dermalert-backend:8000 || true
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}:/sources
    networks:
      - shared-network

  airflow-cli:
    <<: *airflow-common
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    command:
      - bash
      - -c
      - airflow
    networks:
      - shared-network

volumes:
  airflow_pgdata:
  backend_pgdata:
  metastore_pgdata:
  spark_ivy_cache:
  spark_master_recovery:

networks:
  shared-network:
    external: true