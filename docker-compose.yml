x-airflow-common:
  &airflow-common
  # Keep using the standard Airflow image
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:2.10.5}
  # build: 
  #   context: .
  #   dockerfile: Dockerfile.airflow
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres-airflow/dermalert_airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://postgres:postgres@postgres-airflow/dermalert_airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ''
    # Chave fixa compartilhada entre webserver e worker para que os tokens JWT
    # de log-serving sejam válidos em ambos os containers. Sem isso cada
    # container gera uma chave aleatória no boot → InvalidSignatureError.
    AIRFLOW__WEBSERVER__SECRET_KEY: '7aa10963cfba2b3a1bdc0d50f0963ce4f8b1dcfd952c7245294a7c6314c083a7'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # Scheduler tuning: reduz reprocessamento contínuo de DAGs
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: '30'
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: '300'
    AIRFLOW__SCHEDULER__PARSING_PROCESSES: '2'
    AIRFLOW__SCHEDULER__MAX_DAGRUNS_TO_CREATE_PER_LOOP: '5'
    AIRFLOW__SCHEDULER__MAX_TIS_PER_QUERY: '16'
    # Triggerer: limita capacidade (padrão é 1000, excessivo em dev)
    AIRFLOW__TRIGGERER__DEFAULT_CAPACITY: '100'
    # Reduz verbosidade de log
    AIRFLOW__LOGGING__LOGGING_LEVEL: 'WARNING'
    AWS_REGION: us-east-1
    AWS_S3_ALLOW_UNSAFE_RENAME: "true"
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-minio deltalake==1.4.2 beautifulsoup4 openpyxl}
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres-airflow:
      condition: service_healthy
  extra_hosts:
    - "localhost:host-gateway"
  networks:
      - shared-network

services:
  dermalert-backend:
    build: ./project
    command: >
      bash -c "poetry run alembic upgrade head &&
      poetry run uvicorn app.main:app --workers 1 --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    volumes:
      - ./project:/usr/src/app
      # Persist Ivy/Maven JAR cache so Spark dependencies (delta-spark,
      # hadoop-aws, trino-jdbc) are not re-downloaded on every container restart.
      - spark_ivy_cache:/tmp/.ivy2
    ports:
      - 8004:8000
      # Spark driver RPC + BlockManager ports — executors connect back to these.
      # Fixed ports (not random) so docker-compose can expose them to the shared network.
      - "7078:7078"   # spark.driver.port
      - "7079:7079"   # spark.blockManager.port
      - "4040:4040"   # Spark UI
    depends_on:
      postgres-backend:
        condition: service_healthy
      trino:
        condition: service_started
    extra_hosts:
      - "localhost:host-gateway"
    networks:
      - shared-network

  # Microserviço de Dataset Unificado
  # dataset-service:
  #   build: ./dataset-service
  #   env_file:
  #     - .env
  #   volumes:
  #     - ./project:/shared/project
